<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herb miRNA Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<header class="bg-emerald-700 text-white py-4 text-center">
    <div>
        <h1 class="text-xl">中药miRNA数据</h1>
    </div>
</header>


<main class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-300">
        <h2 class="text-lg font-semibold mb-4 text-center text-gray-800">miRNA数据展示</h2>
        
        <div class="max-h-[600px] overflow-y-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-green-100 sticky top-0">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs uppercase tracking-wider">
                            Accession
                            <select class="w-full border border-gray-300 rounded-lg px-2 py-1 mt-1 text-xs" data-column="0">
                                <option value="">全部Accession</option>
                            </select>
                        </th>
                        <th class="px-4 py-3 text-left text-xs uppercase tracking-wider">
                            ID
                            <select class="w-full border border-gray-300 rounded-lg px-2 py-1 mt-1 text-xs" data-column="1">
                                <option value="">全部ID</option>
                            </select>
                        </th>
                        <th class="px-4 py-3 text-left text-xs uppercase tracking-wider">
                            Family
                            <select class="w-full border border-gray-300 rounded-lg px-2 py-1 mt-1 text-xs" data-column="2">
                                <option value="">全部Family</option>
                            </select>
                        </th>
                        <th class="px-4 py-3 text-left text-xs uppercase tracking-wider">
                            Species Latin
                            <select class="w-full border border-gray-300 rounded-lg px-2 py-1 mt-1 text-xs" data-column="3">
                                <option value="">全部拉丁名</option>
                            </select>
                        </th>
                        <th class="px-4 py-3 text-left text-xs uppercase tracking-wider">
                            Sequence
                            <select class="w-full border border-gray-300 rounded-lg px-2 py-1 mt-1 text-xs" data-column="4">
                                <option value="">全部序列</option>
                            </select>
                        </th>
                        <th class="px-4 py-3 text-left text-xs uppercase tracking-wider">
                            Species
                            <select class="w-full border border-gray-300 rounded-lg px-2 py-1 mt-1 text-xs" data-column="5">
                                <option value="">全部中药名</option>
                            </select>
                        </th>
                    </tr>
                </thead>
                <tbody id="miRNATableBody" class="divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
        <div class="mt-4 text-sm text-gray-600 text-center" id="recordCount"> Records</div>
    </div>
</main>

<footer class="bg-emerald-700 text-white py-4 text-center mt-8">
    <p>&copy; 2026 梦翔课题组</p>
</footer>

<script>

    let miRNAData = []; 
    let isLoaded = false;
    const tbody = document.getElementById('miRNATableBody');
    const loadStatus = document.getElementById('loadStatus');
    const recordCount = document.getElementById('recordCount');
    let filterSelects = document.querySelectorAll('select[data-column]');


    function normalizeData(obj) {
        const accession = obj.Accession || '-';
        const id = obj.ID || '-';
        const family = obj.Family || '-';
        const speciesLatin = obj['Species Latin'] || obj.SpeciesLatin || obj.latin_name || '-';
        const sequence = obj.Sequence || '-';
        const species = obj.Species || '-';
        return [accession, id, family, speciesLatin, sequence, species];
    }


    function fillFilterSelects() {
        if (!isLoaded) return;
        const columnVals = [[], [], [], [], [], []];
        miRNAData.forEach(row => {
            row.forEach((val, idx) => {
                if (val !== '-' && !columnVals[idx].includes(val)) {
                    columnVals[idx].push(val);
                }
            });
        });
        filterSelects.forEach(select => {
            const col = parseInt(select.dataset.column);
            columnVals[col].forEach(val => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        });
    }

    function renderTable() {
        if (!isLoaded) return;
        const filters = [];
        filterSelects.forEach(select => {
            filters[parseInt(select.dataset.column)] = select.value.trim();
        });
        const filteredData = miRNAData.filter(row => {
            for (let i = 0; i < 6; i++) {
                if (filters[i] && row[i] !== filters[i]) {
                    return false;
                }
            }
            return true;
        });
        recordCount.textContent = `${filteredData.length} Records (Total ${miRNAData.length} records)`;
        let html = '';
        filteredData.forEach(row => {
            html += `<tr>
                <td>${row[0]}</td>
                <td>${row[1]}</td>
                <td>${row[2]}</td>
                <td>${row[3]}</td>
                <td>${row[4]}</td>
                <td>${row[5]}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    async function loadJSON() {
        const res = await fetch('./web_database_files/miRNA_atlas_results.json');
        const rawData = await res.json();
        miRNAData = rawData.map(item => {
            if (Array.isArray(item)) {
                while (item.length < 6) item.push('-');
                return item.slice(0,6);
            } else {
                return normalizeData(item);
            }
        });
        isLoaded = true;
        fillFilterSelects();
        renderTable();
    }

    filterSelects.forEach(select => {
        select.addEventListener('change', renderTable);
    });

    window.onload = loadJSON;
</script>
</body>
</html>
